name: exo
description: "Workout Tracker App - Production Ready"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  flutter_tts: ^4.2.0
  lottie: ^3.1.0
  file_picker: ^8.0.0
  video_player: ^2.9.1
  cached_network_image: ^3.4.0
  just_audio: ^0.9.36
  audio_session: ^0.1.21
  path_provider: ^2.1.5
  uuid: ^4.4.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  drift: ^2.22.0
  sqlite3_flutter_libs: ^0.5.0
  path: ^1.9.0
  fl_chart: ^0.69.2
  go_router: ^17.2.3
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.4
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  drift_dev: ^2.22.0

flutter:
  uses-material-design: true

  assets:
    - assets/lottie/
    - assets/images/exercises/

  fonts:
    - family: Vazirmatn
      fonts:
        - asset: assets/fonts/Vazirmatn-Regular.ttf
        - asset: assets/fonts/Vazirmatn-Bold.ttf
          weight: 700